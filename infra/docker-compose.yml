version: "3.9"

services:
  # ──────────────────────────────────────────
  # Relational state store
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: slm-postgres
    environment:
      POSTGRES_USER: slm
      POSTGRES_PASSWORD: slm
      POSTGRES_DB: slm_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slm -d slm_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Vector store (episodic + code index)
  # ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: slm-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Observability — Langfuse (self-hosted)
  # ──────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:latest
    container_name: slm-langfuse
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://slm:slm@postgres:5432/slm_agent
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-production
      SALT: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────
  # Model serving — vLLM (GPU required)
  # Comment out if using API-based models
  # ──────────────────────────────────────────
  # vllm-coder:
  #   image: vllm/vllm-openai:latest
  #   container_name: slm-vllm-coder
  #   runtime: nvidia
  #   environment:
  #     NVIDIA_VISIBLE_DEVICES: all
  #   command: >
  #     --model Qwen/Qwen2.5-Coder-7B-Instruct
  #     --host 0.0.0.0
  #     --port 8000
  #     --max-model-len 8192
  #     --enable-chunked-prefill
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - hf_cache:/root/.cache/huggingface
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]

  # ──────────────────────────────────────────
  # Alternative: Ollama (CPU / Apple Silicon)
  # ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: slm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull a model on first run:
    # docker exec slm-ollama ollama pull qwen2.5-coder:7b

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
  # hf_cache:  # Uncomment when using vLLM
